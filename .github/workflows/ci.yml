name: CI

on:
  push:
    branches:
      - main
      - phase5-phase7-*
      - phase5-7-*
      - phase8-*
      - phase8-queue-*
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labra-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: labra-backend/go.mod

      - name: Run Go Tests
        run: go test ./...

  frontend-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labra-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: labra-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Svelte Check
        run: npm run check
