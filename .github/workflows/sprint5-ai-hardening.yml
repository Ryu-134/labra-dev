name: Sprint5 AI + Hardening CI

on:
  pull_request:
    paths:
      - 'labra-backend/**'
      - 'labra-frontend/**'
      - 'labra-infra/**'
      - '.github/workflows/sprint5-ai-hardening.yml'
  push:
    branches: [main]
    paths:
      - 'labra-backend/**'
      - 'labra-frontend/**'
      - 'labra-infra/**'
      - '.github/workflows/sprint5-ai-hardening.yml'

jobs:
  backend-sprint5:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labra-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: labra-backend/go.mod

      - name: Sprint 5 backend tests
        run: go test ./internal/api/handlers -run TestSprint5Phase7Phase8Flow -v

      - name: Full backend tests
        run: go test ./...

  frontend-sprint5:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labra-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: labra-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type checks
        run: npm run check

      - name: Sprint shell tests
        run: node --test tests/smoke.route-map.test.mjs tests/component.shell.test.mjs

      - name: Build app
        run: npm run build

  infra-sprint5:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labra-infra/env/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Terraform fmt check
        run: terraform fmt -check -recursive ../..

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
