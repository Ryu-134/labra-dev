name: Sprint3 Backend CI/CD

on:
  pull_request:
    paths:
      - 'labra-backend/**'
      - '.github/workflows/sprint3-backend-cicd.yml'
  push:
    branches: [main]
    paths:
      - 'labra-backend/**'
      - '.github/workflows/sprint3-backend-cicd.yml'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labra-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: labra-backend/go.mod

      - name: Go Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test ./...

      - name: Race Tests
        run: go test -race ./...

  build-artifact:
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: labra-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: labra-backend/go.mod

      - name: Build Linux artifact
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/labra-backend ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: labra-backend-linux-amd64
          path: labra-backend/dist/labra-backend
          if-no-files-found: error
